            <div style="display: flex; align-items: center; justify-content: space-between; padding: 0 24px; margin-top: 8px;">
                <div class="section-title">Categories</div>

                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15" height="15" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>

            <div class="categories" id="category-pills">

                <a href="#" class="category-pill" data-category="Health">Health</a>

                <a href="#" class="category-pill" data-category="Livelihood">Livelihood</a>

            <div class="section-header">
                <div class="section-title">Your Recommendations</div>
                <div class="filter-dd" id="filter-dd">
                    <button class="filter-btn" id="filter-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15" height="15" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                        <span id="filter-label">All</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </button>
                    <div class="filter-menu" id="filter-menu">
                        <button class="filter-option active" data-status="all">All <span class="opt-count"></span></button>
                        <button class="filter-option" data-status="eligible">Eligible <span class="opt-count"></span></button>
                        <button class="filter-option" data-status="possible">Possible <span class="opt-count"></span></button>
                        <button class="filter-option" data-status="applied">Applied <span class="opt-count"></span></button>
                    </div>
                </div>
            </div>
            <style>
                .filter-dd { position: relative; }
                .filter-btn {
                    display: inline-flex;
                    align-items: center;
                    gap: 6px;
                    border: 1px solid var(--border-color);
                    background: #fff;
                    color: var(--primary-color);
                    font-family: inherit;
                    font-size: 13px;
                    font-weight: 700;
                    padding: 8px 12px;
                    border-radius: 20px;
                    cursor: pointer;
                }
                .filter-menu {
                    position: absolute;
                    right: 0;
                    top: calc(100% + 8px);
                    background: #fff;
                    border: 1px solid var(--border-color);
                    border-radius: 14px;
                    box-shadow: 0 12px 30px rgba(15, 23, 42, 0.14);
                    padding: 6px;
                    min-width: 170px;
                    z-index: 30;
                    display: none;
                }
                .filter-menu.open { display: block; animation: dd-in 0.15s ease; }
                @keyframes dd-in { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
                .filter-option {
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    width: 100%;
                    border: none;
                    background: none;
                    font-family: inherit;
                    font-size: 13.5px;
                    font-weight: 600;
                    color: var(--text-main);
                    padding: 10px 12px;
                    border-radius: 10px;
                    cursor: pointer;
                    text-align: left;
                }
                .filter-option:hover { background: #f8fafc; }
                .filter-option.active { background: #eff4ff; color: var(--primary-color); font-weight: 700; }
                .opt-count {
                    font-size: 11.5px;
                    font-weight: 700;
                    color: #64748b;
                    background: #f1f5f9;
                    border-radius: 999px;
                    padding: 2px 8px;
                }
                .filter-option.active .opt-count { background: #dbe7ff; color: var(--primary-color); }
            </style>

        </div>

            <a href="transactions.html" class="dash-nav-item">

                    <rect x="8.5" y="12" width="7" height="5" rx="1"></rect>
                </svg>
                History
            </a>
            <a href="profile.html" class="dash-nav-item">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="3" width="8" height="8" rx="2"></rect>
                    <rect x="13" y="3" width="8" height="8" rx="2"></rect>
                    <rect x="13" y="13" width="8" height="8" rx="2"></rect>
                    <rect x="3" y="13" width="8" height="8" rx="2"></rect>

    <script type="module">
        import { supabase, CURRENT_USER_ID } from './assets/js/supabase-client.js';

        const listEl = document.getElementById('benefit-list');
        const pillsEl = document.getElementById('category-pills');

        const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) =>
            ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

        const CHECK_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>';
        const INFO_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>';
        const HEART_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>';

        const filterDd = document.getElementById('filter-dd');
        const filterBtn = document.getElementById('filter-btn');
        const filterMenu = document.getElementById('filter-menu');
        const filterLabel = document.getElementById('filter-label');

        const [{ data: rows, error }, { data: myApps }] = await Promise.all([
            supabase.from('assistance').select('*')
                .eq('user_id', CURRENT_USER_ID).order('sort_order', { ascending: true }),
            supabase.from('applications').select('assistance_id, status')
                .eq('user_id', CURRENT_USER_ID),
        ]);

        const appliedIds = new Set((myApps || []).map(a => a.assistance_id));

        let activeCategory = 'All';
        let activeStatus = 'all';

        function render() {
            const visible = (rows || []).filter((r) => {
                if (activeCategory !== 'All' && r.category !== activeCategory) return false;
                if (activeStatus === 'eligible') return r.eligibility_status === 'eligible';
                if (activeStatus === 'possible') return r.eligibility_status !== 'eligible';
                if (activeStatus === 'applied') return appliedIds.has(r.id);
                return true;
            }).sort((a, b) => {
                // Eligible programs first, then possible; stable by sort_order.
                const rank = (r) => r.eligibility_status === 'eligible' ? 0 : 1;
                return rank(a) - rank(b) || a.sort_order - b.sort_order;
            });
            if (!visible.length) {
                listEl.innerHTML = '<p style="padding: 8px 24px; color: #64748b;">No benefits match these filters.</p>';
                return;
            }
            listEl.innerHTML = visible.map((r) => {
                const accent = r.accent_color || '#0d3b9e';
                const isEligible = r.eligibility_status === 'eligible';
                const statusLabel = isEligible ? 'Eligible' : 'Possible';
                const amount = r.amount_label || r.assistance_type || '';
                const appliedBadge = appliedIds.has(r.id)
                    ? '<span class="status-tag" style="color: #3b82f6; background-color: #eff6ff;">Applied</span>'
                    : '';
                return `
                <a href="details.html?id=${encodeURIComponent(r.id)}" class="benefit-card">
                    <div class="card-icon" style="color: ${accent}; background-color: ${accent}1a;">
                        ${HEART_ICON}
                    </div>
                    <div class="card-content">
                        <div class="card-top">
                            <span class="agency">${esc(r.agency)}</span>
                            <span style="display: flex; gap: 6px;">
                                ${appliedBadge}
                                <span class="status-tag ${isEligible ? 'eligible' : 'possible'}">
                                    ${isEligible ? CHECK_ICON : INFO_ICON}
                                    ${statusLabel}
                                </span>
                            </span>
                        </div>
                        <div class="card-title">${esc(r.program_name)}</div>
                        <div class="card-desc">${esc(r.description)}</div>
                        <div class="card-bottom">
                            <span class="amount">${esc(amount)}</span>
                            <span class="view-btn">View <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="9 18 15 12 9 6"></polyline></svg></span>
                        </div>
                    </div>
                </a>`;
            }).join('');
        }

        // Counts are scoped to the currently selected category.
        function updateCounts() {
            const inCategory = (rows || []).filter(r => activeCategory === 'All' || r.category === activeCategory);
            const counts = {
                all: inCategory.length,
                eligible: inCategory.filter(r => r.eligibility_status === 'eligible').length,
                possible: inCategory.filter(r => r.eligibility_status !== 'eligible').length,
                applied: inCategory.filter(r => appliedIds.has(r.id)).length,
            };
            filterMenu.querySelectorAll('.filter-option').forEach((opt) => {
                opt.querySelector('.opt-count').textContent = counts[opt.dataset.status];
            });
        }

        if (error) {
            console.error('Failed to load assistance', error);
            listEl.innerHTML = '<p style="padding: 8px 24px; color: #64748b;">Could not load benefits.</p>';
        } else {
            updateCounts();
            render();

            pillsEl.addEventListener('click', (e) => {
                const pill = e.target.closest('.category-pill');
                if (!pill) return;
                e.preventDefault();
                pillsEl.querySelectorAll('.category-pill').forEach((p) => p.classList.remove('active'));
                pill.classList.add('active');
                activeCategory = pill.dataset.category;
                updateCounts();
                render();
            });

            filterBtn.addEventListener('click', () => filterMenu.classList.toggle('open'));
            document.addEventListener('click', (e) => {
                if (!filterDd.contains(e.target)) filterMenu.classList.remove('open');
            });

            filterMenu.addEventListener('click', (e) => {
                const opt = e.target.closest('.filter-option');
                if (!opt) return;
                filterMenu.querySelectorAll('.filter-option').forEach((o) => o.classList.remove('active'));
                opt.classList.add('active');
                activeStatus = opt.dataset.status;
                filterLabel.textContent = opt.dataset.status === 'all' ? 'All'
                    : opt.textContent.trim().replace(/\d+$/, '').trim();
                filterMenu.classList.remove('open');
                render();
            });
        }
    </script>
</body>

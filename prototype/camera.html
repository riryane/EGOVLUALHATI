<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eGovPH - Capture Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0d3b9e;
            --white: #ffffff;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background-color: #000;
            color: var(--white);
            height: 100vh;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        /* Top Header */
        .camera-header {
            display: flex;
            align-items: center;
            padding: 24px 20px;
            z-index: 10;
        }
        .back-btn {
            color: var(--white);
            text-decoration: none;
            display: flex;
            align-items: center;
        }
        
        /* Camera Viewfinder */
        .viewfinder-container {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .camera-feed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Placeholder background simulating a camera feed */
            background: linear-gradient(135deg, #333 0%, #111 100%);
            z-index: 0;
        }
        
        /* The cutout frame for the document */
        .scan-frame {
            position: relative;
            z-index: 2;
            width: 85%;
            height: 60%;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.6); /* darkens everything outside the frame */
        }
        
        .scan-frame::before, .scan-frame::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: #3b82f6;
            border-style: solid;
        }
        .scan-frame::before {
            top: -2px; left: -2px;
            border-width: 4px 0 0 4px;
            border-top-left-radius: 12px;
        }
        .scan-frame::after {
            bottom: -2px; right: -2px;
            border-width: 0 4px 4px 0;
            border-bottom-right-radius: 12px;
        }
        
        .scan-frame-corners-2::before, .scan-frame-corners-2::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: #3b82f6;
            border-style: solid;
        }
        .scan-frame-corners-2::before {
            top: -2px; right: -2px;
            border-width: 4px 4px 0 0;
            border-top-right-radius: 12px;
        }
        .scan-frame-corners-2::after {
            bottom: -2px; left: -2px;
            border-width: 0 0 4px 4px;
            border-bottom-left-radius: 12px;
        }
        
        .instruction {
            position: absolute;
            bottom: 20%;
            width: 100%;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: var(--white);
            z-index: 5;
            padding: 0 20px;
        }
        
        /* Bottom Controls */
        .camera-controls {
            padding: 30px 20px 50px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            z-index: 10;
        }
        
        .capture-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background-color: var(--white);
            border: 4px solid #cbd5e1;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 0 4px #000 inset;
            text-decoration: none;
        }
        
        .capture-btn:active {
            transform: scale(0.95);
            background-color: #e2e8f0;
        }
        
    </style>
</head>
<body>
    <div class="camera-header">
        <a href="document-requirements.html" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="28" height="28"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </a>
    </div>
    
    <div class="viewfinder-container">
        <!-- Placeholder camera background -->
        <div class="camera-feed"></div>
        
        <div class="scan-frame">
            <div class="scan-frame-corners-2" style="width: 100%; height: 100%;"></div>
        </div>
        
        <div class="instruction">
            Position the document within the frame
        </div>
    </div>
    
    <div class="camera-controls">
        <a href="document-requirements.html" class="capture-btn">
            <!-- Clicking this brings user back to requirements -->
        </a>
    </div>
</body>
</html>

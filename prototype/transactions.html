    <script type="module">
        import { supabase, CURRENT_USER_ID } from './assets/js/supabase-client.js';

        const listEl = document.getElementById('app-list');
        const filtersEl = document.getElementById('status-filters');

        const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) =>
            ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

        const STATUS = {
            pending:    { label: 'Pending',     color: '#f59e0b', bg: '#fffbeb',
                icon: '<circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>' },
            approved:   { label: 'Approved',    color: '#3b82f6', bg: '#eff6ff',
                icon: '<polyline points="20 6 9 17 4 12"></polyline>' },
            rejected:   { label: 'Rejected',    color: '#ef4444', bg: '#fef2f2',
                icon: '<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>' },
            for_pickup: { label: 'For Pick-up', color: '#8b5cf6', bg: '#f5f3ff',
                icon: '<path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.29 7 12 12 20.71 7"></polyline><line x1="12" y1="22" x2="12" y2="12"></line>' },
            done:       { label: 'Done',        color: '#10b981', bg: '#ecfdf5',
                icon: '<circle cx="12" cy="12" r="10"></circle><polyline points="16 10 10 16 7 13"></polyline>' },
        };

        const fmtDate = (d) => new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

        let apps = [];

        function render(filter) {
            const visible = filter === 'all' ? apps : apps.filter(a => a.status === filter);
            if (!visible.length) {
                listEl.innerHTML = '<p style="padding: 16px 24px; color: #64748b;">No applications here yet.</p>';
                return;
            }
            listEl.innerHTML = visible.map(a => {
                const s = STATUS[a.status] || STATUS.pending;
                const prog = a.assistance || {};
                return `
                <div class="transaction-item">
                    <div class="tx-icon" style="color: ${s.color}; background-color: ${s.bg};">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">${s.icon}</svg>
                    </div>
                    <div class="tx-details">
                        <div class="tx-title">${esc(prog.program_name || 'Ayuda Application')}</div>
                        <div class="tx-subtitle">${esc(prog.agency || '')} • Applied ${fmtDate(a.applied_at)}</div>
                    </div>
                    <div class="tx-amount-col">
                        <div class="tx-amount" style="color: ${s.color};">${esc(prog.amount_label || prog.assistance_type || '')}</div>
                        <div class="tx-status" style="color: ${s.color};">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">${s.icon}</svg>
                            ${s.label}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        const { data, error } = await supabase
            .from('applications')
            .select('id, status, applied_at, assistance ( program_name, agency, amount_label, assistance_type )')
            .eq('user_id', CURRENT_USER_ID)
            .order('applied_at', { ascending: false });

        if (error) {
            console.error(error);
            listEl.innerHTML = '<p style="padding: 16px 24px; color: #64748b;">Could not load applications. (Has applications.sql been run?)</p>';
        } else {
            apps = data;
            document.getElementById('sum-total').textContent = apps.length;
            document.getElementById('sum-done').textContent = apps.filter(a => a.status === 'done').length;
            document.getElementById('sum-active').textContent =
                apps.filter(a => ['pending', 'approved', 'for_pickup'].includes(a.status)).length;
            render('all');

            filtersEl.addEventListener('click', (e) => {
                const pill = e.target.closest('.filter-pill');
                if (!pill) return;
                e.preventDefault();
                filtersEl.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                render(pill.dataset.status);
            });
        }
    </script>

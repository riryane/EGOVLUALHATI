<!DOCTYPE html>

    <style>
        .id-card {
            margin: 8px 24px 24px;
            border-radius: 20px;
            padding: 20px;
            color: #fff;
            background: linear-gradient(135deg, #0d3b9e 0%, #0a2e7a 100%);
            box-shadow: 0 12px 30px rgba(13, 59, 158, 0.25);
        }
        .id-card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .id-card-head .id-type {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            opacity: 0.9;
        }
        .id-card-head .id-flag {
            font-size: 11px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.15);
            padding: 4px 8px;
            border-radius: 6px;
        }
        .id-card-body { display: flex; gap: 16px; align-items: center; }
        .id-photo {
            width: 84px;
            height: 84px;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            background-color: rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.4);
        }
        .id-name { font-size: 18px; font-weight: 800; line-height: 1.2; }
        .id-number {
            margin-top: 8px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 1px;
            font-variant-numeric: tabular-nums;
        }
        .id-meta {
            margin: 20px 24px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px 12px;
        }
        .id-meta .meta-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }
        .id-meta .meta-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-top: 2px;
        }
        .id-meta .full { grid-column: 1 / -1; }
    </style>
</head>
<body>
    <script type="module">
        // Auth guard: no session, no access.
        import { requireSession } from './assets/js/session.js';
        requireSession();
    </script>

                    style="color: #0ea5e9; margin-left: 2px;">

                    <path d="M15.3409 3.57144C11.2389 -0.0163351 4.76106 -0.0163351 0.658999 3.57144C0.42236 3.77843 0.398327 4.13808 0.605315 4.37472C0.812304 4.61136 1.17195 4.63539 1.40859 4.42841C5.10515 1.19472 10.8947 1.19472 14.5913 4.42841C14.828 4.63539 15.1876 4.61136 15.3946 4.37472C15.6016 4.13808 15.5775 3.77843 15.3409 3.57144Z" />

        <div class="page-header">

    <script type="module">
        import { supabase, CURRENT_USER_ID } from './assets/js/supabase-client.js';

        const rootEl = document.getElementById('id-root');
        const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) =>
            ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        const fmtDate = (d) => d
            ? new Date(d).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })
            : '—';

        const { data: card, error } = await supabase
            .from('id_cards')
            .select('*')
            .eq('user_id', CURRENT_USER_ID)
            .limit(1)
            .single();

        if (error || !card) {
            console.error('Failed to load ID card', error);
            rootEl.innerHTML = '<p style="padding:24px;">No Digital ID found for this account.</p>';
        } else {
            rootEl.innerHTML = `
                <div class="id-card">
                    <div class="id-card-head">
                        <span class="id-type">${esc(card.id_type)}</span>
                        <span class="id-flag">🇵🇭 Republic of the Philippines</span>
                    </div>
                    <div class="id-card-body">
                        <div class="id-photo" style="background-image: url('${esc(card.photo_url)}');"></div>
                        <div>
                            <div class="id-name">${esc(card.full_name)}</div>
                            <div class="id-number">${esc(card.id_number)}</div>
                        </div>
                    </div>
                </div>
                <div class="id-meta">
                    <div>
                        <div class="meta-label">Date of Birth</div>
                        <div class="meta-value">${fmtDate(card.date_of_birth)}</div>
                    </div>
                    <div>
                        <div class="meta-label">Sex</div>
                        <div class="meta-value">${esc(card.sex)}</div>
                    </div>
                    <div class="full">
                        <div class="meta-label">Address</div>
                        <div class="meta-value">${esc(card.address)}</div>
                    </div>
                    <div>
                        <div class="meta-label">Date Issued</div>
                        <div class="meta-value">${fmtDate(card.date_issued)}</div>
                    </div>
                </div>`;
        }
    </script>
</body>

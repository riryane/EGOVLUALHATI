    <script type="module">
        // Profile data comes from the session (populated by eGov SSO at login) —
        // no users-table fetch here.
        import { currentProfile } from './assets/js/session.js';

        const user = currentProfile();
        if (user) {
            const firstName = (user.full_name || '').trim().split(' ')[0].toUpperCase();
            if (firstName) document.getElementById('greeting-name').textContent = `Mabuhay, ${firstName}`;
            if (user.location) document.getElementById('user-location').textContent = user.location;
            if (user.avatar_url) {
                document.getElementById('profile-pic').style.backgroundImage = `url('${user.avatar_url}')`;
            }
        }
    </script>

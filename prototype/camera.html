<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eGovPH - Capture Document</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <style>
        .app-container.cam {
            background-color: #000;
            color: var(--white);
        }

        .camera-header {
            display: flex;
            align-items: center;
            padding: 24px 20px;
            z-index: 10;
        }
        .camera-header .back-btn {
            color: var(--white);
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .viewfinder-container {
            flex: 1;
            min-height: 0;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .camera-feed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: linear-gradient(135deg, #333 0%, #111 100%);
            z-index: 0;
        }

        .scan-frame {
            position: relative;
            z-index: 2;
            width: 85%;
            height: 60%;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.6);
        }
        .scan-frame::before, .scan-frame::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: #3b82f6;
            border-style: solid;
        }
        .scan-frame::before {
            top: -2px; left: -2px;
            border-width: 4px 0 0 4px;
            border-top-left-radius: 12px;
        }
        .scan-frame::after {
            bottom: -2px; right: -2px;
            border-width: 0 4px 4px 0;
            border-bottom-right-radius: 12px;
        }
        .scan-frame-corners-2::before, .scan-frame-corners-2::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: #3b82f6;
            border-style: solid;
        }
        .scan-frame-corners-2::before {
            top: -2px; right: -2px;
            border-width: 4px 4px 0 0;
            border-top-right-radius: 12px;
        }
        .scan-frame-corners-2::after {
            bottom: -2px; left: -2px;
            border-width: 0 0 4px 4px;
            border-bottom-left-radius: 12px;
        }

        .instruction {
            position: absolute;
            bottom: 12%;
            width: 100%;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: var(--white);
            z-index: 5;
            padding: 0 20px;
        }

        .camera-controls {
            padding: 24px 20px 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            z-index: 10;
        }
        .capture-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background-color: var(--white);
            border: 4px solid #cbd5e1;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 0 4px #000 inset;
        }
        .capture-btn:active {
            transform: scale(0.95);
            background-color: #e2e8f0;
        }

        /* Processing overlay (mock OCR) — inside the phone frame */
        .processing-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.88);
            z-index: 50;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            text-align: center;
            padding: 24px;
        }
        .processing-overlay.show { display: flex; }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .processing-title { font-size: 17px; font-weight: 700; }
        .processing-sub { font-size: 14px; color: #94a3b8; }

        .success-check {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #10b981;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .captured-preview {
            max-width: 70%;
            max-height: 30%;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            object-fit: cover;
        }

        .camera-error {
            position: absolute;
            z-index: 3;
            text-align: center;
            padding: 0 32px;
            font-size: 14px;
            color: #cbd5e1;
            display: none;
        }
    </style>
</head>
<body>
    <script type="module">
        // Auth guard: no session, no access.
        import { requireSession } from './assets/js/session.js';
        requireSession();
    </script>

    <div class="app-container cam">
        <div class="camera-header">
            <a href="document-requirements.html" class="back-btn" id="back-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="28" height="28"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </a>
        </div>

        <div class="viewfinder-container">
            <video class="camera-feed" id="camera-feed" autoplay playsinline muted></video>
            <div class="camera-error" id="camera-error">
                Camera unavailable. You can still simulate a capture with the button below.
            </div>

            <div class="scan-frame">
                <div class="scan-frame-corners-2" style="width: 100%; height: 100%;"></div>
            </div>

            <div class="instruction" id="capture-instruction">
                Position the document within the frame
            </div>
        </div>

        <div class="camera-controls">
            <button class="capture-btn" id="capture-btn" aria-label="Capture"></button>
        </div>

        <!-- OCR processing overlay -->
        <div class="processing-overlay" id="processing-overlay">
            <img class="captured-preview" id="captured-preview" alt="" style="display:none;">
            <div class="spinner" id="processing-spinner"></div>
            <div class="success-check" id="success-check" style="display:none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" width="36" height="36" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <div>
                <div class="processing-title" id="processing-title">Extracting document…</div>
                <div class="processing-sub" id="processing-sub">Reading text from your document</div>
            </div>
            <div id="extract-result" style="display: none; max-height: 30%; overflow-y: auto; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 14px 16px; font-size: 12.5px; line-height: 1.7; text-align: left; width: 100%; max-width: 340px;"></div>
            <div id="mismatch-warning" style="display: none; align-items: flex-start; gap: 10px; background: rgba(245, 158, 11, 0.12); border: 1px solid rgba(245, 158, 11, 0.4); border-radius: 12px; padding: 12px 14px; font-size: 13px; color: #fbbf24; text-align: left; width: 100%; max-width: 340px; line-height: 1.5;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" style="flex-shrink: 0; margin-top: 1px;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                <span id="mismatch-text"></span>
            </div>
            <button id="extract-continue" style="display: none; border: none; background: #1d4ed8; color: #fff; font-family: inherit; font-size: 15px; font-weight: 700; padding: 14px 32px; border-radius: 12px; cursor: pointer;">Continue</button>
            <button id="extract-retry" style="display: none; border: none; background: none; color: #94a3b8; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer;">Retake</button>
        </div>
    </div>

    <script type="module">
        // Real camera feed + eGov AI Document Extractor OCR.
        // Falls back to a mock sequence when the AI token isn't configured.
        import { extractDocument, isOcrConfigured } from './assets/js/egov-ai.js';

        const params = new URLSearchParams(location.search);
        const ayudaId = params.get('id');
        const docName = params.get('name') || 'Document';
        // Keyed by document name — a captured doc counts for every ayuda needing it.
        const capturedKey = `captured_doc_${docName.toLowerCase().replace(/[^a-z0-9]+/g, '_')}`;
        const returnUrl = ayudaId
            ? `document-requirements.html?id=${encodeURIComponent(ayudaId)}`
            : 'document-requirements.html';

        document.getElementById('back-link').href = returnUrl;
        document.getElementById('capture-instruction').textContent =
            `Position your ${docName} within the frame`;

        const video = document.getElementById('camera-feed');
        const errorEl = document.getElementById('camera-error');
        const overlay = document.getElementById('processing-overlay');
        const preview = document.getElementById('captured-preview');
        const spinner = document.getElementById('processing-spinner');
        const check = document.getElementById('success-check');
        const titleEl = document.getElementById('processing-title');
        const subEl = document.getElementById('processing-sub');

        let stream = null;

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                console.warn('Camera unavailable:', err);
                errorEl.style.display = 'block';
            }
        }
        startCamera();

        const resultEl = document.getElementById('extract-result');
        const continueBtn = document.getElementById('extract-continue');
        const retryBtn = document.getElementById('extract-retry');
        const mismatchEl = document.getElementById('mismatch-warning');
        const mismatchText = document.getElementById('mismatch-text');

        // Does the extracted text plausibly match the REQUIRED document?
        // The extractor reads any document — this checks it's the right one.
        const DOC_KEYWORDS = {
            'proof of billing':    ['billing', 'bill', 'barangay', 'certificate', 'meralco', 'electric', 'water', 'utility'],
            'barangay residency':  ['barangay', 'residency', 'resident', 'certificate', 'punong'],
            'barangay certificate':['barangay', 'certificate', 'indigency', 'indigent', 'punong'],
            'certificate of enrollment': ['enrollment', 'enrolment', 'registration', 'student', 'school', 'university', 'college', 'semester'],
            'grades':              ['grade', 'report card', 'gwa', 'rating', 'subject', 'semester'],
            'medical':             ['medical', 'hospital', 'diagnosis', 'burial', 'death', 'school', 'tuition', 'abstract'],
        };
        function matchesRequiredDoc(extractedHtml) {
            const text = extractedHtml.toLowerCase();
            const nameLc = docName.toLowerCase();
            const entry = Object.entries(DOC_KEYWORDS).find(([k]) => nameLc.includes(k.split(' ')[0]) && nameLc.includes(k.split(' ')[1] || ''));
            const keywords = entry ? entry[1]
                : nameLc.split(/[^a-z]+/).filter(w => w.length > 3); // fallback: words of the doc name
            return keywords.some(k => text.includes(k));
        }

        function captureBlob() {
            return new Promise((resolve) => {
                if (!(stream && video.videoWidth)) return resolve(null);
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                preview.src = canvas.toDataURL('image/jpeg', 0.8);
                preview.style.display = 'block';
                canvas.toBlob(resolve, 'image/jpeg', 0.85);
            });
        }

        function markVerifiedAndFinish() {
            localStorage.setItem(capturedKey, '1');
            spinner.style.display = 'none';
            check.style.display = 'flex';
            titleEl.textContent = 'Document Extracted';
            subEl.textContent = `${docName} verified`;
        }

        function resetOverlay() {
            overlay.classList.remove('show');
            spinner.style.display = 'block';
            check.style.display = 'none';
            resultEl.style.display = 'none';
            mismatchEl.style.display = 'none';
            continueBtn.style.display = 'none';
            continueBtn.textContent = 'Continue';
            continueBtn.style.background = '#1d4ed8';
            continueBtn.onclick = finish;
            retryBtn.style.display = 'none';
            preview.style.display = 'none';
            titleEl.textContent = 'Extracting document…';
            subEl.textContent = 'Reading text from your document';
        }

        function finish() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            window.location.href = returnUrl;
        }
        continueBtn.onclick = finish;
        retryBtn.addEventListener('click', resetOverlay);

        document.getElementById('capture-btn').addEventListener('click', async () => {
            const blob = await captureBlob();
            overlay.classList.add('show');

            if (isOcrConfigured() && blob) {
                // REAL OCR via the eGov AI Document Extractor.
                try {
                    subEl.textContent = 'Analyzing with eGov AI…';
                    const extracted = await extractDocument(blob, `${docName.replace(/\W+/g, '_')}.jpg`);
                    resultEl.innerHTML = extracted; // API returns formatted <b>/<br> HTML
                    resultEl.style.display = 'block';

                    if (matchesRequiredDoc(extracted)) {
                        markVerifiedAndFinish();
                        continueBtn.style.display = 'inline-block';
                    } else {
                        // Extracted fine, but it doesn't look like the required doc.
                        spinner.style.display = 'none';
                        titleEl.textContent = 'Wrong Document?';
                        subEl.textContent = '';
                        mismatchText.textContent = `This doesn't look like a ${docName}. Please retake with the correct document.`;
                        mismatchEl.style.display = 'flex';
                        retryBtn.style.display = 'inline-block';
                        continueBtn.textContent = 'Use Anyway';
                        continueBtn.style.background = '#475569';
                        continueBtn.style.display = 'inline-block';
                        continueBtn.onclick = () => { localStorage.setItem(capturedKey, '1'); finish(); };
                    }
                } catch (err) {
                    console.error(err);
                    spinner.style.display = 'none';
                    titleEl.textContent = 'Extraction Failed';
                    subEl.textContent = 'Could not read the document. Please retake the photo.';
                    retryBtn.style.display = 'inline-block';
                }
                return;
            }

            // No mock: without the eGov AI token (or a camera frame) we refuse.
            spinner.style.display = 'none';
            titleEl.textContent = 'Cannot Verify Document';
            subEl.textContent = !blob
                ? 'Camera unavailable — a real photo is required for OCR verification.'
                : 'eGov AI OCR is not configured. Add the hackathon token to enable document extraction.';
            retryBtn.style.display = 'inline-block';
        });
    </script>
</body>
</html>
